repos:
  # Detectar secrets antes de commit
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(\.env\.example|TESTING\.md|setup\.py)$

  # Prevenir commits de archivos grandes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Bandit - Security linter de Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-c', '.bandit', '-l']
        exclude: ^tests/

  # Black - Code formatter
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3

  # Flake8 - Style guide enforcement
  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--extend-ignore=E203']

  # isort - Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ['--profile', 'black']

  # Verificar archivos .env no se commitean
  - repo: local
    hooks:
      - id: forbid-env-files
        name: Forbid .env files
        entry: \.env$
        language: regex
        types: [file]
        pass_filenames: false
        always_run: true
        stages: [commit]

  # Verificar que .env no tiene valores
  - repo: local
    hooks:
      - id: forbid-env-secrets
        name: Forbid secrets in .env.example
        entry: bash -c 'if grep -q "^[^#]*=.+" .env.example 2>/dev/null | grep -v "^[^=]*=$"; then exit 1; fi'
        language: system
        files: ^\.env\.example$
        stages: [commit]
